<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of the Lake-View Suite with a large arched window overlooking the lake">
  <defs>
    <linearGradient id="lakeWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FA9C9"/>
      <stop offset="0.55" stop-color="#3F6E8C"/>
      <stop offset="0.56" stop-color="#2B2A45"/>
      <stop offset="1" stop-color="#181729"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="#F4EEE2"/>
  <rect x="0" y="180" width="400" height="60" fill="#E9E0CC"/>
  <!-- arched window with lake view -->
  <path d="M150 140 V60 q0 -50 50 -50 q50 0 50 50 v80 z" fill="url(#lakeWin)"/>
  <path d="M150 140 V60 q0 -50 50 -50 q50 0 50 50 v80 z" fill="none" stroke="#D4AF6A" stroke-width="5"/>
  <circle cx="170" cy="40" r="6" fill="#F4D78A" opacity="0.9"/>
  <path d="M150 105 q50 -18 100 0" stroke="#FBF8F2" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- chaise / daybed -->
  <rect x="30" y="170" width="120" height="16" rx="4" fill="#A8602F"/>
  <rect x="30" y="140" width="120" height="34" rx="8" fill="#C97F4B"/>
  <rect x="24" y="132" width="18" height="40" rx="6" fill="#A8602F"/>
  <!-- small brass table -->
  <rect x="262" y="180" width="50" height="6" rx="2" fill="#D4AF6A"/>
  <rect x="280" y="186" width="6" height="24" fill="#D4AF6A"/>
  <circle cx="283" cy="172" r="10" fill="#FBF8F2"/>
</svg>
